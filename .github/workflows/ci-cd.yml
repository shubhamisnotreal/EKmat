name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  # Temporarily disable explicit signing since keys aren't loaded in GH Actions yet
  DOCKER_CONTENT_TRUST: 0

jobs:
  build-and-secure:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        # Skip login on pull requests if not pushing
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build Backend Image
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-backend:latest ./backend

      # Scan Backend with Snyk
      - name: Run Snyk to check Backend Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-backend:latest
          args: --file=backend/Dockerfile
        continue-on-error: true

      # Scan Backend with Trivy (OS only)
      - name: Run Trivy to check Backend OS vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'

      # Push Backend (Only on main branch)
      - name: Push signed Backend Image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-backend:latest

      # Build Frontend Image
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-frontend:latest ./frontend

      # Scan Frontend with Snyk
      - name: Run Snyk to check Frontend Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-frontend:latest
          args: --file=frontend/Dockerfile
        continue-on-error: true

      # Scan Frontend with Trivy (OS only)
      - name: Run Trivy to check Frontend OS vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'

      # Push Frontend (Only on main branch)
      - name: Push signed Frontend Image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/rkmat-frontend:latest
