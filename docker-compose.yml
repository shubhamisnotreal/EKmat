version: '3.8'

services:
  blockchain:
    image: trufflesuite/ganache:latest
    command: --wallet.mnemonic "test test test test test test test test test test test junk" --chain.chainId 1337 --server.port 8545 --miner.blockTime 1
    ports:
      - "8545:8545"
    networks:
      - rkmat-network

  deployer:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      - blockchain
    command: sh -c "npm install && npm run deploy:ganache"
    networks:
      - rkmat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - deployer
    networks:
      - rkmat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80" # Exposed on port 3000 as per user request
    depends_on:
      - backend
      - deployer
    networks:
      - rkmat-network

networks:
  rkmat-network:
    driver: bridge
